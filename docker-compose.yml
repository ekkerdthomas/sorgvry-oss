services:
  sorgvry-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sorgvry-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8600:8080"
      - "172.17.0.1:8600:8080"
    volumes:
      - /opt/sorgvry/data:/app/data
    env_file:
      - /opt/sorgvry/.env
    environment:
      - DB_PATH=/app/data/sorgvry.db
